{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card">

            <div class="card-body">

                <h2 class="text-center mb-4">
                    Register
                </h2>

                <form method="POST">

                    {% csrf_token %}

                    <input
                        type="text"
                        name="username"
                        class="form-control mb-3"
                        placeholder="Username"
                        required>

                    <input
                        type="email"
                        name="email"
                        class="form-control mb-3"
                        placeholder="Email"
                        required>

                    <input
                        type="password"
                        name="password"
                        class="form-control mb-3"
                        placeholder="Password"
                        required>

                    <button
                        class="btn btn-success w-100">

                        Register

                    </button>

                </form>

                {% if message %}

                <div class="alert alert-danger mt-3">

                    {{ message }}

                </div>

                {% endif %}

                <hr>

                <p class="text-center">

                    Already have an account?

                    <a href="/login/">

                        Login

                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
