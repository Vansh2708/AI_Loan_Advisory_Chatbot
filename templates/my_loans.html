{% extends 'base.html' %}

{% block content %}

<h2>My Loans</h2>

<table class="table">

<tr>

<th>ID</th>
<th>Type</th>
<th>Amount</th>
<th>Status</th>

</tr>

{% for loan in loans %}

<tr>

<td>{{ loan.id }}</td>

<td>{{ loan.loan_type }}</td>

<td>{{ loan.amount }}</td>

<td>{{ loan.status }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
